apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders

spec:
  replicas: 1

  selector:
    matchLabels:
      app: orders

  template:
    metadata:
      labels:
        app: orders

    spec:
      containers:
        - name: orders

          image: orders:v1

          imagePullPolicy: Never

          ports:
            - containerPort: 3002

          resources:
            requests:
              cpu: "100m"

            limits:
              cpu: "500m" 